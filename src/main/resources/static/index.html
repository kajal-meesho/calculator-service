<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            background-color: #f1f5f9;
        }
        .card {
            background: #fff; border-radius: 16px; padding: 40px; width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center;
        }
        h1 { font-size: 1.8rem; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 24px; }
        .input-group { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
        .input-group label { font-size: 0.85rem; font-weight: 500; color: #334155; width: 100%; text-align: left; }
        .input-group input, .input-group select {
            flex: 1; min-width: 100px; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px;
            font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group select:focus { border-color: #6366f1; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 20px 0 12px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 500;
            cursor: pointer; transition: background 0.2s, transform 0.1s; color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #6366f1; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary { background: #64748b; }
        .btn-secondary:hover { background: #475569; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-info { background: #06b6d4; }
        .btn-info:hover { background: #0891b2; }
        .btn-warning { background: #f59e0b; }
        .btn-warning:hover { background: #d97706; }
        .result-box {
            margin-top: 16px; padding: 16px; background: #f8fafc; border-radius: 10px;
            font-size: 1.1rem; color: #0f172a; min-height: 56px; word-break: break-all;
        }
        .result-box.error { color: #dc2626; }
        .meta { margin-top: 8px; font-size: 0.75rem; color: #94a3b8; }
        a { color: #6366f1; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>Meesho Calculator</h1>
    <p class="subtitle">Perform basic arithmetic operations</p>

    <div class="input-group">
        <label for="numA">Number A</label>
        <input type="number" id="numA" step="any" value="10">
    </div>
    <div class="input-group">
        <label for="numB">Number B</label>
        <input type="number" id="numB" step="any" value="5">
    </div>
    <div class="input-group">
        <label for="operation">Operation</label>
        <select id="operation">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="multiply">Multiply</option>
            <option value="divide">Divide</option>
        </select>
    </div>

    <div class="btn-row">
        <button class="btn btn-primary" onclick="calculate()">Calculate</button>
        <button class="btn btn-success" onclick="health()">Health</button>
        <button class="btn btn-info" onclick="background()">Background</button>
        <button class="btn btn-warning" onclick="metrics()">Metrics</button>
    </div>

    <div id="result" class="result-box">Result will appear here</div>
    <div class="meta">Meesho Calculator Service</div>
</div>

<script>
    const BASE = '';

    function getPayload() {
        return {
            a: parseFloat(document.getElementById('numA').value) || 0,
            b: parseFloat(document.getElementById('numB').value) || 0,
            operation: document.getElementById('operation').value
        };
    }

    function showResult(data) {
        const el = document.getElementById('result');
        el.classList.remove('error');
        if (data.error) {
            el.classList.add('error');
            el.textContent = 'Error: ' + data.error;
        } else if (data.result !== undefined) {
            el.textContent = 'Result: ' + data.result;
        } else if (data.status) {
            el.textContent = JSON.stringify(data, null, 2);
        } else {
            el.textContent = JSON.stringify(data, null, 2);
        }
    }

    async function calculate() {
        try {
            const res = await fetch(BASE + '/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(getPayload())
            });
            const data = await res.json();
            showResult(data);
        } catch (e) {
            showResult({error: e.message});
        }
    }

    async function health() {
        try {
            const res = await fetch(BASE + '/health');
            const data = await res.json();
            showResult(data);
        } catch (e) {
            showResult({error: e.message});
        }
    }

    async function background() {
        try {
            const res = await fetch(BASE + '/background');
            const data = await res.json();
            document.body.style.backgroundColor = data.color;
            showResult({color: data.color, message: 'Background colour updated'});
        } catch (e) {
            showResult({error: e.message});
        }
    }

    async function metrics() {
        try {
            const res = await fetch(BASE + '/metrics/summary');
            const data = await res.json();
            showResult(data);
        } catch (e) {
            showResult({error: e.message});
        }
    }
</script>
</body>
</html>
